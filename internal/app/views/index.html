<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      Default-deny CSP: the view runs entirely from its inlined bundle and talks
      to the host only through window.postMessage, which needs no network origin.
      No external hosts are granted; connect-src stays denied by default-src.
      script-src / style-src carry only 'unsafe-inline' (no 'unsafe-eval'): the
      inlined module script and every component <style> / adopted stylesheet run
      inline, and nothing takes an eval / new Function path at runtime.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Status</title>
    <style>
      /*
        Document-level base only. The CSS custom properties declared on :root
        inherit through every component's shadow boundary, so each Web Component
        styles itself from these tokens without re-declaring the palette. All
        structural component rules live in the shared adopted stylesheet
        (src/styles.ts); nothing here is derived from payload data.
      */
      :root {
        color-scheme: light dark;
        --fg: #1b1f24;
        --muted: #5b6672;
        --bg: #ffffff;
        --card: #f5f7fa;
        --border: #dfe4ea;
        --clear: #1f8a4c;
        --attention: #b4690e;
        --blocked: #c0392b;
        --accent: #2f6feb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #e6e9ee;
          --muted: #9aa4b0;
          --bg: #14171c;
          --card: #1d222a;
          --border: #2b323c;
          --clear: #48c07d;
          --attention: #e0a44a;
          --blocked: #e57373;
          --accent: #6ea0ff;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 16px;
        font:
          14px/1.45 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <project-status-app></project-status-app>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
