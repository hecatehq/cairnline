name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: internal/app/views/.bun-version

      # The Project Status view bundle is gitignored and built from source. Build
      # it before the Go steps so the //go:embed all:views/dist directory carries
      # the real bundle (not just the .gitkeep placeholder + "not built" fallback)
      # when Go compiles and tests run. Order matters: JS build before Go.
      - name: Build embedded views bundle
        working-directory: internal/app/views
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Race
        run: go test -race ./...

  views:
    name: Views
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: internal/app/views/.bun-version

      - name: Install views dependencies
        working-directory: internal/app/views
        run: bun install --frozen-lockfile

      # Typecheck and run the Vitest component tests for the Web Components view.
      # This replaces the old "bundle freshness" diff guard: the bundle is no
      # longer committed, so the real coverage is the component test suite.
      - name: Typecheck
        working-directory: internal/app/views
        run: bun run typecheck

      - name: Test
        working-directory: internal/app/views
        run: bun run test
