name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: internal/app/views/.bun-version

      # The Project Status view bundle is gitignored and built from source. Build
      # it before any Go step so the released binaries embed the real view (not
      # the "not built" fallback). Order matters: JS build before Go.
      - name: Build embedded views bundle
        working-directory: internal/app/views
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Race
        run: go test -race ./...

      - name: Build archives
        run: ./scripts/build-release.sh "$GITHUB_REF_NAME"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease_flag=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes "${prerelease_flag[@]}"
